name: Publish Release APK

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v3.0.1"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  RELEASE_REPO: Kwanlam08/InspireMusic-Releases
  APK_NAME: InspireMusic-release.apk

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare release values
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
            DISPLAY_VERSION="$TAG"
            PRERELEASE="${{ inputs.prerelease }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            DISPLAY_VERSION="$TAG"
            PRERELEASE="false"
          else
            VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)"
            if [ -z "$VERSION_NAME" ]; then
              VERSION_NAME="dev"
            fi
            TAG="v${VERSION_NAME}"
            DISPLAY_VERSION="v${VERSION_NAME}"
            PRERELEASE="false"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "display_version=$DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"

      - name: Publish APK to public release repository
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          DISPLAY_VERSION: ${{ steps.release.outputs.display_version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
          SOURCE_SHA: ${{ github.sha }}
        shell: python
        run: |
          import json
          import mimetypes
          import os
          import pathlib
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ.get("GH_TOKEN", "")
          if not token:
              print("Missing RELEASE_REPO_TOKEN secret.", file=sys.stderr)
              sys.exit(1)

          repo = os.environ["RELEASE_REPO"]
          tag = os.environ["TAG_NAME"]
          display_version = os.environ.get("DISPLAY_VERSION", tag)
          prerelease = os.environ["PRERELEASE"].lower() == "true"
          apk_path = pathlib.Path(os.environ["APK_NAME"])
          asset_name = apk_path.name

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def request(method, url, data=None, extra_headers=None):
              body = None
              if data is not None:
                  if isinstance(data, (bytes, bytearray)):
                      body = data
                  else:
                      body = json.dumps(data).encode("utf-8")
              req_headers = dict(headers)
              if extra_headers:
                  req_headers.update(extra_headers)
              req = urllib.request.Request(url, data=body, headers=req_headers, method=method)
              try:
                  with urllib.request.urlopen(req) as resp:
                      content = resp.read()
                      return json.loads(content.decode("utf-8")) if content else None
              except urllib.error.HTTPError as exc:
                  if exc.code == 404:
                      return None
                  print(exc.read().decode("utf-8", errors="replace"), file=sys.stderr)
                  raise

          api_base = f"https://api.github.com/repos/{repo}"
          release = request("GET", f"{api_base}/releases/tags/{urllib.parse.quote(tag)}")
          body = (
              "# 灵感音乐 Android APK ✨\n\n"
              f"- 版本：`{display_version}`\n"
              f"- 源码提交：`{os.environ['SOURCE_SHA']}`\n"
              "- 安装包：请下载下方的 `InspireMusic-release.apk`\n\n"
              "灵感音乐不是想把本地音乐做成一张冷冰冰的列表。它更像一个小小的音乐房间：专辑、播放列表、歌词和最近播放都被安静地收好；当你不知道听什么的时候，AI 灵感页也能根据一句话、一种心情或一个场景，递给你一份新的歌单灵感。🎧\n\n"
              "## 这次你会得到\n\n"
              "- 🫧 Liquid Glass 风格的底栏、mini 播放器、按钮、卡片和设置界面。\n"
              "- 🎵 本地音乐资料库：歌曲、专辑、艺人、播放列表和我的喜爱。\n"
              "- ✨ AI 灵感歌单：用自然语言描述想听的音乐。\n"
              "- 📝 音乐日记：按日记、周记、月记回看自己的听歌痕迹。\n"
              "- 🎤 歌词、在线歌词搜索和歌词缓存管理。\n"
              "- 💾 播放列表、音乐日记、最近播放的数据备份。\n"
              "- 📦 音乐存储空间统计。\n\n"
              "## 安装说明\n\n"
              "1. 下载本页面下方的 APK 文件。\n"
              "2. 在 Android 设备上打开 APK。\n"
              "3. 如果系统提示，请允许从此来源安装应用。\n"
              "4. 首次启动后授予音乐 / 媒体访问权限。\n\n"
              "如果提示“软件包与已有软件包存在冲突”，通常是旧版和新版签名不同。请先卸载旧版一次，再安装最新版；之后使用固定签名版本应可正常覆盖更新。\n\n"
              "---\n\n"
              "# Inspire Music Android APK ✨\n\n"
              f"- Version: `{display_version}`\n"
              f"- Source commit: `{os.environ['SOURCE_SHA']}`\n"
              "- APK: download `InspireMusic-release.apk` below\n\n"
              "Inspire Music is meant to feel less like a cold music database and more like a small listening room. It keeps your albums, playlists, lyrics, and recent plays organized, then helps you find the next spark when you only have a mood, a scene, or one vague sentence in your head.\n\n"
              "## Highlights\n\n"
              "- 🫧 Liquid Glass-inspired bottom bar, mini player, buttons, cards, and settings.\n"
              "- 🎵 Local songs, albums, artists, playlists, and favorites.\n"
              "- ✨ AI inspiration playlists from natural-language prompts.\n"
              "- 📝 Music Diary with daily, weekly, and monthly listening memories.\n"
              "- 🎤 Lyrics, online lyric search, and lyric cache management.\n"
              "- 💾 Backups for playlists, Music Diary, and recently played data.\n"
              "- 📦 Music storage usage overview.\n\n"
              "## Installation\n\n"
              "1. Download the APK asset below.\n"
              "2. Open it on your Android device.\n"
              "3. Allow installation from this source if Android asks.\n"
              "4. Grant music / media permission after launching the app.\n\n"
              "If Android says the package conflicts with an existing package, the installed app was likely signed with an older certificate. Uninstall the old build once, then install the latest APK. Future stable-signed builds should update normally.\n"
          )

          if release is None:
              release = request("POST", f"{api_base}/releases", {
                  "tag_name": tag,
                  "name": tag,
                  "body": body,
                  "draft": False,
                  "prerelease": prerelease,
              })
          else:
              request("PATCH", f"{api_base}/releases/{release['id']}", {
                  "name": tag,
                  "body": body,
                  "prerelease": prerelease,
              })
              release = request("GET", f"{api_base}/releases/tags/{urllib.parse.quote(tag)}")

          for asset in release.get("assets", []):
              if asset.get("name") == asset_name:
                  request("DELETE", f"{api_base}/releases/assets/{asset['id']}")

          upload_url = release["upload_url"].split("{", 1)[0]
          upload_url = f"{upload_url}?name={urllib.parse.quote(asset_name)}"
          content_type = mimetypes.guess_type(asset_name)[0] or "application/vnd.android.package-archive"
          request(
              "POST",
              upload_url,
              data=apk_path.read_bytes(),
              extra_headers={
                  "Content-Type": content_type,
                  "Content-Length": str(apk_path.stat().st_size),
              },
          )

          print(f"Published {asset_name} to https://github.com/{repo}/releases/tag/{tag}")
