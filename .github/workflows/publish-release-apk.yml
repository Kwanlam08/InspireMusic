name: Test and Publish Release APK

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v3.9.0"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PUBLIC_RELEASE_REPO: Kwanlam08/InspireMusic-Releases
  APK_NAME: InspireMusic-release.apk

jobs:
  smoke-test:
    name: Navigation smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

      - name: Run memory and navigation smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          disable-animations: true
          disable-linux-hw-accel: false
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: chmod +x ./gradlew && ./gradlew testDebugUnitTest connectedDebugAndroidTest --no-daemon --max-workers=1 --console=plain

      - name: Upload instrumentation report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-smoke-test-reports
          path: |
            app/build/reports/
            app/build/outputs/androidTest-results/
          if-no-files-found: ignore

  build-and-publish:
    name: Build and publish APK
    needs: smoke-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon --max-workers=1 --console=plain
          cp app/build/outputs/apk/release/app-release.apk "$APK_NAME"

      - name: Prepare release values
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
            PRERELEASE="${{ inputs.prerelease }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            PRERELEASE="false"
          else
            VERSION_NAME="$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts | head -n 1)"
            TAG="v${VERSION_NAME:-dev}"
            PRERELEASE="false"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Publish APK to source repository
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          prerelease_args=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_NAME" --repo "$GITHUB_REPOSITORY" --clobber
            gh release edit "$TAG_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" --notes-file .github/release-notes.md
          else
            gh release create "$TAG_NAME" "$APK_NAME" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" --notes-file .github/release-notes.md "${prerelease_args[@]}"
          fi

      - name: Mirror APK to public release repository
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing RELEASE_REPO_TOKEN secret." >&2
            exit 1
          fi
          prerelease_args=()
          if [ "$PRERELEASE" = "true" ]; then
            prerelease_args+=(--prerelease)
          fi
          if gh release view "$TAG_NAME" --repo "$PUBLIC_RELEASE_REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK_NAME" --repo "$PUBLIC_RELEASE_REPO" --clobber
            gh release edit "$TAG_NAME" --repo "$PUBLIC_RELEASE_REPO" \
              --title "$TAG_NAME" --notes-file .github/release-notes.md
          else
            gh release create "$TAG_NAME" "$APK_NAME" --repo "$PUBLIC_RELEASE_REPO" \
              --title "$TAG_NAME" --notes-file .github/release-notes.md "${prerelease_args[@]}"
          fi
